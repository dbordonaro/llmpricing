server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Enable gzip for faster loads
    gzip on;
    gzip_types text/css text/plain application/json text/csv;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache data files (elo.csv changes weekly)
    location ~* \.(json|csv)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Serve index.html for root
    location / {
        try_files $uri $uri/ =404;
        add_header X-Content-Type-Options nosniff;
    }
}
