server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Enable gzip for faster loads
    gzip on;
    gzip_types text/css text/plain application/json text/csv;
    gzip_min_length 256;

    # Cache non-JS static assets
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # JS should not be cached (use ?v= param for cache-busting)
    location ~* \.js$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Don't cache data files (elo.csv changes weekly)
    location ~* \.(json|csv)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Serve index.html for root
    location / {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }
}
